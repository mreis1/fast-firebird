<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 150" width="720" height="150" role="img" aria-label="fast-firebird">
  <defs>
    <linearGradient id="ff-fire" x1="10" y1="118" x2="120" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E42A0E"/>
      <stop offset=".45" stop-color="#FF6A2C"/>
      <stop offset=".8" stop-color="#FF9D3C"/>
      <stop offset="1" stop-color="#FFD24A"/>
    </linearGradient>
    <linearGradient id="ff-word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6A2C"/>
      <stop offset="1" stop-color="#FFB13C"/>
    </linearGradient>
  </defs>

  <!-- mark -->
  <g transform="translate(6 11)">
    <g stroke="url(#ff-fire)" stroke-linecap="round" fill="none">
