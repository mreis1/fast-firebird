      <path d="M2 66h40" stroke-width="8" opacity=".55"/>
      <path d="M8 86h30" stroke-width="7" opacity=".35"/>
    </g>
    <path fill="url(#ff-fire)" d="M40 92 C 52 96 66 92 76 82 C 70 88 58 88 54 82 C 70 84 84 74 88 58 C 82 66 72 68 66 64 C 86 60 100 44 100 22 C 108 40 112 58 104 74 C 118 66 124 52 122 36 C 128 60 118 86 96 98 C 78 108 54 106 40 92 Z"/>
    <path fill="url(#ff-fire)" d="M100 22 C 110 20 120 24 124 32 L 108 34 C 104 30 102 26 100 22 Z"/>
    <circle cx="106" cy="30" r="2.4" fill="#0e1116"/>
  </g>

  <!-- wordmark -->
  <text x="150" y="78" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#C0562A">fast-</tspan><tspan fill="url(#ff-word)">firebird</tspan>
  </text>
  <text x="152" y="108" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="15.5" letter-spacing="0.3" fill="#8b99a8">
    the fast, pure-TypeScript Firebird driver for Node.js
  </text>
