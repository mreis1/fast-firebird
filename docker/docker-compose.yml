# Isolated Firebird test matrix for fast-firebird.
# ALWAYS run with an explicit project name so nothing collides with other
# Docker resources on this machine:
#   docker compose -p fast-firebird-test -f docker/docker-compose.yml up -d --wait
# Cleanup ONLY via scripts/docker-cleanup.sh (scoped to this project).
# See plans/docker-safety.md for the full rules.

name: fast-firebird-test

x-fb-common: &fb-common
  restart: "no"
  networks: [fast-firebird-test-net]
  environment: &fb-env
    FIREBIRD_ROOT_PASSWORD: masterkey
    FIREBIRD_DATABASE: test.fdb
    FIREBIRD_DATABASE_DEFAULT_CHARSET: UTF8
    # Allow both encrypted and plaintext wire so tests can exercise each mode.
    FIREBIRD_CONF_WireCrypt: Enabled
    # Let clients negotiate zlib wire compression.
    FIREBIRD_CONF_WireCompression: "true"
    # Srp256 (default) plus plain Srp so legacy clients (npm node-firebird)
    # and our sha1 tests can authenticate.
    FIREBIRD_CONF_AuthServer: Srp256, Srp
  healthcheck:
    test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/3050"]
    interval: 2s
    timeout: 3s
    retries: 30

services:
  fb3:
    <<: *fb-common
    image: firebirdsql/firebird:3
    container_name: fast-firebird-test-fb3
    environment:
      <<: *fb-env
      # Fixed async-event port, published 1:1 so the event aux channel is
      # reachable from the host (otherwise it picks an unmapped random port).
      FIREBIRD_CONF_RemoteAuxPort: "3053"
    ports:
      - "127.0.0.1:30503:3050"
      - "127.0.0.1:3053:3053"
    volumes:
      - fast-firebird-test-fb3-data:/var/lib/firebird/data

  fb4:
    <<: *fb-common
    image: firebirdsql/firebird:4
    container_name: fast-firebird-test-fb4
    ports:
      - "127.0.0.1:30504:3050"
      - "127.0.0.1:3054:3054"
    environment:
      <<: *fb-env
      # FB4+ supports ChaCha; offer all so the driver can negotiate the best.
      FIREBIRD_CONF_WireCryptPlugin: ChaCha20, ChaCha, ChaCha64, Arc4
      FIREBIRD_CONF_RemoteAuxPort: "3054"
    volumes:
      - fast-firebird-test-fb4-data:/var/lib/firebird/data

  fb5:
    <<: *fb-common
    image: firebirdsql/firebird:5
    container_name: fast-firebird-test-fb5
    ports:
      - "127.0.0.1:30505:3050"
      - "127.0.0.1:3055:3055"
    environment:
      <<: *fb-env
      FIREBIRD_CONF_WireCryptPlugin: ChaCha20, ChaCha, ChaCha64, Arc4
      FIREBIRD_CONF_RemoteAuxPort: "3055"
    volumes:
      - fast-firebird-test-fb5-data:/var/lib/firebird/data

  # Firebird 6 snapshot — protocol 20. Snapshot builds move; the suite treats
  # this lane as the canary for FB6 changes (schemas, protocol 20 prepare).
  fb6:
    <<: *fb-common
    image: firebirdsql/firebird:6-snapshot
    container_name: fast-firebird-test-fb6
    ports:
      - "127.0.0.1:30507:3050"
      - "127.0.0.1:3057:3057"
    environment:
      <<: *fb-env
      FIREBIRD_CONF_WireCryptPlugin: ChaCha20, ChaCha, ChaCha64, Arc4
      FIREBIRD_CONF_RemoteAuxPort: "3057"
    volumes:
      - fast-firebird-test-fb6-data:/var/lib/firebird/data

  # Legacy_Auth server for testing the migration path (SRP disabled).
  fblegacy:
    <<: *fb-common
    image: firebirdsql/firebird:3
    container_name: fast-firebird-test-fblegacy
    ports:
      - "127.0.0.1:30506:3050"
    environment:
      <<: *fb-env
      # Legacy_Auth enabled alongside SRP (SRP kept only so the image can
      # provision SYSDBA); tests create a Legacy_UserManager user and log in
      # via Legacy_Auth — the exact client path a legacy-only server uses.
      FIREBIRD_CONF_AuthServer: Srp256, Srp, Legacy_Auth
      FIREBIRD_CONF_UserManager: Srp, Legacy_UserManager
      FIREBIRD_CONF_WireCrypt: Disabled
    volumes:
      - fast-firebird-test-fblegacy-data:/var/lib/firebird/data

networks:
  fast-firebird-test-net:
    name: fast-firebird-test-net

volumes:
  fast-firebird-test-fb3-data:
    name: fast-firebird-test-fb3-data
  fast-firebird-test-fb4-data:
    name: fast-firebird-test-fb4-data
  fast-firebird-test-fb5-data:
    name: fast-firebird-test-fb5-data
  fast-firebird-test-fb6-data:
    name: fast-firebird-test-fb6-data
  fast-firebird-test-fblegacy-data:
    name: fast-firebird-test-fblegacy-data
